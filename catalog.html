<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог — OrixGold</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f7f3ee;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:#fff;
  border-bottom:1px solid #eee;
}

.logo{
  font-size:28px;
  font-weight:bold;
}

.btn{
  padding:10px 15px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

.btn--gold{
  background:#b88c52;
  color:white;
}

.btn--ghost{
  background:#fff;
  border:1px solid #ddd;
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

/* PRODUCT */
.product{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  transition:.3s;
  border:1px solid #eee;
}

.product:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.product__media{
  height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.product__media img{
  max-width:80%;
  max-height:80%;
  transition:.3s;
}

.product:hover img{
  transform:scale(1.1);
}

.product__body{
  padding:15px;
}

.product h3{
  font-size:16px;
  margin:0;
}

.product__price{
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}

.product__footer{
  display:flex;
  gap:10px;
  margin-top:10px;
}

/* CART */
.cart{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#fff;
  border-left:1px solid #ddd;
  padding:20px;
  transform:translateX(100%);
  transition:.3s;
}

.cart.open{
  transform:translateX(0);
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">ORIX</div>
  <button onclick="toggleCart()" class="btn btn--ghost">Кошик (<span id="count">0</span>)</button>
</div>

<div class="container">
  <h1>Каталог</h1>

  <div class="products" id="products"></div>
</div>

<div class="cart" id="cart">
  <h2>Кошик</h2>
  <div id="cartItems"></div>
</div>

<script>

const products = [
  {
    id:1,
    name:"Каблучка з діамантом",
    price:16108,
    image:"https://static.wixstatic.com/media/6b2377_39e8f04da31a4f708f04f265849c02a8~mv2.png"
  },
  {
    id:2,
    name:"Обручка",
    price:14982,
    image:"https://static.wixstatic.com/media/6b2377_1c1a72ee39b54d55bc4a5f33e6b645ba~mv2.png"
  },
  {
    id:3,
    name:"Підвіс",
    price:8045,
    image:"https://static.wixstatic.com/media/6b2377_a18d180f385e4a7c8d327d8c969379b3~mv2.png"
  },
  {
    id:4,
    name:"Шпилька",
    price:1987,
    image:"https://static.wixstatic.com/media/6b2377_4765e43735a7464d8870efa5424bc3ee~mv2.png"
  }
];

let cart = [];

function render(){
  const el = document.getElementById("products");

  el.innerHTML = products.map(p=>`
    <div class="product">

      <div class="product__media">
        <img src="${p.image}">
      </div>

      <div class="product__body">
        <h3>${p.name}</h3>
        <div class="product__price">${p.price} грн</div>

        <div class="product__footer">
          <button class="btn btn--ghost" onclick="quick('${p.name}')">Купити</button>
          <button class="btn btn--gold" onclick="add(${p.id})">+</button>
        </div>
      </div>

    </div>
  `).join("");
}

function add(id){
  const item = products.find(p=>p.id===id);
  cart.push(item);
  updateCart();
}

function updateCart(){
  document.getElementById("count").innerText = cart.length;

  document.getElementById("cartItems").innerHTML =
    cart.map(i=>`<div>${i.name}</div>`).join("");
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

function quick(name){
  alert("Замовлення: "+name);
}

render();

</script>

</body>
</html>
