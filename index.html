<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIX — ювелірний дім</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f5f2;
  color: #222;
}

/* HEADER */
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
}

.header__inner {
  max-width: 1200px;
  margin: auto;
  padding: 15px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo img {
  height: 50px;
}

.nav {
  display: flex;
  gap: 25px;
}

.nav a {
  text-decoration: none;
  color: #222;
  font-weight: 500;
}

.nav a:hover {
  color: #c8a96a;
}

.actions {
  display: flex;
  gap: 10px;
}

.btn {
  padding: 8px 15px;
  border: 1px solid #c8a96a;
  background: transparent;
  border-radius: 20px;
  cursor: pointer;
}

/* TITLE */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 30px 20px;
}

h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

/* CATALOG */
.catalog {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
}

.card h3 {
  font-size: 16px;
}

.price {
  font-size: 18px;
  font-weight: bold;
  margin: 10px 0;
}

.btn-buy {
  background: #c8a96a;
  color: #fff;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}
</style>

</head>
<body>

<header class="header">
  <div class="header__inner">

    <!-- ЛОГО (ТВОЄ) -->
    <div class="logo">
      <img src="https://i.imgur.com/6XGQx9p.png" alt="ORIX">
    </div>

    <!-- МЕНЮ -->
    <nav class="nav">
      <a href="#">Каталог</a>
      <a href="#">Категорії</a>
      <a href="#">Розмір каблучки</a>
      <a href="#">Доставка</a>
      <a href="#">Контакти</a>
    </nav>

    <div class="actions">
      <button class="btn">Зв'язатися</button>
    </div>

  </div>
</header>

<div class="container">
  <h1>Каталог ювелірних прикрас</h1>

  <div class="catalog">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e">
      <h3>Каблучка золота</h3>
      <div class="price">16 108 грн</div>
      <button class="btn-buy">У кошик</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1588449668365-d15e397f6787">
      <h3>Обручка</h3>
      <div class="price">14 982 грн</div>
      <button class="btn-buy">У кошик</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
      <h3>Сережки</h3>
      <div class="price">11 154 грн</div>
      <button class="btn-buy">У кошик</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f">
      <h3>Браслет</h3>
      <div class="price">27 002 грн</div>
      <button class="btn-buy">У кошик</button>
    </div>

  </div>
</div>

</body>
</html>
